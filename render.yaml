services:
  # Frontend Client
  - type: web
    name: lms-client
    env: static
    rootDir: client
    buildCommand: npm ci && NODE_OPTIONS=--max-old-space-size=384 npm run build
    staticPublishPath: dist
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://lms-o8o8.onrender.com/api/v1
      - key: NODE_VERSION
        value: 20.11.1

  # Backend Server
  - type: web
    name: lms-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: NODE_OPTIONS=--max-old-space-size=384 npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.1
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://lms-client-ct7h.onrender.com
      - key: CORS_ORIGINS
        value: https://lms-client-ct7h.onrender.com
      - key: MAILSERVER
        sync: false
      - key: MAILPORT
        sync: false
      - key: MAILUSER
        sync: false
      - key: PASSWORD
        sync: false
      - key: MAILSERVER3
        sync: false
      - key: MAILPORT3
        sync: false
      - key: MAILUSER3
        sync: false
      - key: PASSWORD3
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: CLOUDFRONT_DOMAIN
        sync: false
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false 