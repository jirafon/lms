<svg xmlns="http://www.w3.org/2000/svg" viewBox="150 70 380 350" role="img" aria-labelledby="title desc">
  <title id="title">Unbiax logo</title>
  <desc id="desc">Outlined Unbiax wordmark with blue, gray, and orange crossing lines.</desc>
  <defs>
    <linearGradient id="leftBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#73c7f4" />
      <stop offset="100%" stop-color="#2d8ed8" />
    </linearGradient>
    <linearGradient id="midGray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8ddd8" />
      <stop offset="100%" stop-color="#7f8f9a" />
    </linearGradient>
    <linearGradient id="rightOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd28a" />
      <stop offset="100%" stop-color="#f1a33c" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-width="10" opacity="0.96" filter="url(#softGlow)">
    <path stroke="url(#leftBlue)" d="M188 120 L343 397" />
    <path stroke="url(#leftBlue)" d="M188 363 L343 92" />
    <path stroke="url(#midGray)" d="M343 92 L494 363" />
    <path stroke="url(#midGray)" d="M343 397 L494 120" />
    <path stroke="url(#rightOrange)" d="M431 122 L494 238" />
    <path stroke="url(#rightOrange)" d="M494 120 L444 208" />
  </g>

  <text
    x="173"
    y="266"
    fill="rgba(255,255,255,0.02)"
    stroke="#ffffff"
    stroke-width="2.4"
    paint-order="stroke"
    font-family="Avenir Next, Nunito, Montserrat, Arial Rounded MT Bold, sans-serif"
    font-size="110"
    font-weight="700"
    letter-spacing="-6"
  >unbiax</text>
</svg>
